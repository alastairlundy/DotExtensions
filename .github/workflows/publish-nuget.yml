# This workflow will build and publish System Extensions to Nuget.

name: Publish to Nuget

on:
  workflow_dispatch:
    
permissions:
  contents: read

jobs:
  publish-nuget:

    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write 
    environment: production

    steps:
    - name: Harden the runner (Audit all outbound calls)
      uses: step-security/harden-runner@ab7a9404c0f3da075243ca237b5fac12c98deaa5 # v2.19.3
      with:
        egress-policy: audit

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
    - name: Setup .NET
      uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
      with:
        dotnet-version: 10.0.x
        working-directory: DotExtensions
    
    # Get a short-lived NuGet API key
    - name: NuGet login (OIDC → temp API key)
      uses: NuGet/login@8d196754b4036150537f80ac539e15c2f1028841 # v1.2.0
      id: login
      with:
            user: ${{ secrets.NUGET_USER }}
    
    - name: Restore dependencies
      run: dotnet restore
    - name: Create packages
      run: dotnet build -c Release
    - name: Publish the MAIN package to nuget.org
      run: dotnet nuget push DotExtensions/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}}  -s https://api.nuget.org/v3/index.json --skip-duplicate
    - name: Publish the Memory package to nuget.org
      run: dotnet nuget push DotExtensions.Memory/bin/Release/*.nupkg --api-key ${{steps.login.outputs.NUGET_API_KEY}}  $NUGET_AUTH_TOKEN -s https://api.nuget.org/v3/index.json --skip-duplicate
